<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Products</title>
        <link rel="styleSheet" href="Css/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>
    <body>
        <nav>
            <div>
                <div class="brand">
                    <img class="logo" src="Assets/logo.png" alt="Logo Pic">
                    <span class="brandName">Delicious Bite</span>
                </div>
            </div>
            <div>
                <a href="index.html"  class="links">Home</a>
                <a href="products.html"id="active" class="links">Products</a>
                <a href="about.html" class="links">About us</a>
                <a href="contact.html" class="links">Contact</a>
                <a href="login.html" class="links">Logout</a>
                <a href="cart.html" class="links">Cart</a>
            </div>
        </nav>
      

        <section>
            <div class="productHeader">
                <div class="P-Hero">
                    <div>
                        <img class="HeroImg" src="Assets/food_16989378.png" alt="Chef Hat Illustration">
                    </div>
                    <div class="productTitle">Our Menu </div>
                </div>
               
                <div class="productCategories">
                    <button class="categorieBtn" id="chosenCategorie">All</button>
                    <button class="categorieBtn">Special Offer</button>
                    <button class="categorieBtn">Food</button>
                    <button class="categorieBtn">Drinks</button>
                    <button class="categorieBtn">Healthy</button>
                    <button class="categorieBtn">Side</button>
                    <div class="searchContainer">
                        <input class="searchBar" type="search" placeholder="Search">
                        <i class="fas fa-search searchIcon"></i>
                    </div>
                </div>
            </div>
            
           
            <div class="productCardContainer">
                <div class="card">
                    <div class="foodImg">
                        <img src="Assets/taco.png" alt="Tacos">
                    </div>
                    <div class="CardDetails">
                      <div>
                        <span>Tacos</span>
                        <span>$3</span>
                      </div>
                      <button class="addToCartBtn">Add to Cart</button>
                    </div>
                </div>
                <div class="card">
                    <div class="foodImg">
                        <img src="Assets/pizza (1).png" alt="Pizza">
                    </div>
                    <div class="CardDetails">
                      <div>
                        <span>Pizza</span>
                        <span>$8</span>
                      </div>
                      <button class="addToCartBtn">Add to Cart</button>
                    </div>
                </div>
                <div class="card">
                    <div class="foodImg">
                        <img src="Assets/coffee.png" alt="Iced Coffee">
                    </div>
                    <div class="CardDetails">
                      <div>
                        <span>Iced Coffee</span>
                        <span>$10</span>
                      </div>
                      <button class="addToCartBtn">Add to Cart</button>
                    </div>
                </div>
                <div class="card">
                    <div class="foodImg">
                        <img src="Assets/green salad.png" alt="Green Salad">
                    </div>
                   
                    <div class="CardDetails">
                      <div>
                        <span>Green Salad</span>
                        <span>$5</span>
                      </div>
                      <button class="addToCartBtn">Add to Cart</button>
                    </div>
                </div>

                <div class="card">
                    <div class="foodImg">
                        <img src="Assets/cheese burger.png" alt="cheese burger ">
                    </div>
                    <div class="CardDetails">
                      <div>
                        <span>Cheese burger</span>
                        <span>$2</span>
                      </div>
                      <button class="addToCartBtn">Add to Cart</button>
                    </div>
                </div>
                <div class="card">
                    <div class="foodImg">
                        <img src="Assets/apple juice.png" alt="Apple juice">
                    </div>
                    <div class="CardDetails">
                      <div>
                        <span>Apple juice</span>
                        <span>$1.75</span>
                      </div>
                      <button class="addToCartBtn">Add to Cart</button>
                    </div>
                </div>
                
                <div class="card">
                    <div class="foodImg">
                        <img src="Assets/fries.png" alt="fries">
                    </div>
                    <div class="CardDetails">
                      <div>
                        <span>French Fries</span>
                        <span>$1</span>
                      </div>
                      <button class="addToCartBtn">Add to Cart</button>
                    </div>
                </div>

            </div>
        </section>



        <footer>
            <div class="footerContainer">
                <div>
                    <div class="footerTitle"> Contact Info</div><br>
                    <div><a class="links" href="#">info@gmail.com</a></div>
                </div>
    
                <div> 
                    <div class="footerTitle">Social Media</div><br>
                    <div class="social-icons">
                        <a href="https://www.facebook.com">
                            <i class="fab fa-facebook"></i>
                        </a> 
                        <a href="https://www.instagram.com">
                            <i class="fab fa-instagram"></i>
                        </a>
                    </div>
                </div>
            </div>
            
            <hr style="opacity: 40%;">
            <span>&copy; 2025 Delicious Bite. All rights reserved.</span>
          </footer>
    </body>
</html>
