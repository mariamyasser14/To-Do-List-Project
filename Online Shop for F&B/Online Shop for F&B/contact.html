<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact</title>
        <link rel="styleSheet" href="Css/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>
    <body>
        <nav>
            <div>
                <div class="brand">
                    <img class="logo" src="Assets/logo.png" alt="Logo Pic">
                    <span class="brandName">Delicious Bite</span>
                </div>
            </div>
            <div>
                <a href="index.html"  class="links">Home</a>
                <a href="products.html" class="links">Products</a>
                <a href="about.html" class="links">About us</a>
                <a href="contact.html"  id="active"  class="links">Contact</a>
                <a href="login.html" class="links">Logout</a>
                <a href="cart.html" class="links">Cart</a>
            </div>
        </nav>

        
        <section>
            <div  class="Hero">
                <div>
                    <img class="HeroImg" src="Assets/send-message_8440910.png" alt="Chef Hat Illustration">
                    <h1>Get in Touch</h1>
                    <p>We'd love to hear from you! Fill out the form and our team will get back shortly.</p>
                </div>
            </div>
            
            <div class="contactContainer">
                <form action="index.html" method="get">
                <div>
                    <div class="FN">
                        <label for="FN">First Name </label> <br>
                        <input type="text" name="FN" id="FN" placeholder="Enter your first name" required>
                        <span class="msg">Not Valid</span>
                    </div><br>
                    <div class="LN">
                        <label for="LN">Last Name </label><br>
                        <input type="text" name="LN" id="LN" placeholder="Enter your last name" required>
                         <span class="msg">Not Valid</span>
                        
                    </div><br>
                    <div>
                        <label for="email">Email </label><br>
                        <input type="email" name="email" id="email" placeholder="Enter your email" required>
                        <span class="msg">Not Valid</span>
                    </div><br>
                    <span><label for="msg">Message </label></span>
                    <div>
                        <textarea  name="msg" id="msg" placeholder="Enter your message" cols="44" rows="8" required></textarea>
                    </div><br>
                    <div>
                        <input class="btn" type="reset" value="Clear" > 
                        <button class="btn">Submit</button> 
                        
                    </div>
                </div>
               </form>
               
               <div>
                <img class="contactImg" src="Assets/contact.jpg">
               </div>
               <div style="clear: both;"></div>
            </div>
        </section>



        <footer>
            <div class="footerContainer">
                <div>
                    <div class="footerTitle"> Contact Info</div><br>
                    <div><a class="links" href="#">info@gmail.com</a></div>
                </div>
    
                <div> 
                    <div class="footerTitle">Social Media</div><br>
                    <div class="social-icons">
                        <a href="https://www.facebook.com">
                            <i class="fab fa-facebook"></i>
                        </a> 
                        <a href="https://www.instagram.com">
                            <i class="fab fa-instagram"></i>
                        </a>
                    </div>
                </div>
            </div>
            
            <hr style="opacity: 40%;">
            <span>&copy; 2025 Delicious Bite. All rights reserved.</span>
          </footer>
    </body>
</html>
