<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Delicious Bite</title>
    <link rel="stylesheet" href="Css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div>
            <div class="brand">
                <img class="logo" src="Assets/logo.png" alt="Logo Pic">
                <span class="brandName">Delicious Bite</span>
            </div>
        </div>
        <div>
            <a href="index.html" class="links">Home</a>
            <a href="products.html" class="links">Products</a>
            <a href="about.html" class="links">About us</a>
            <a href="contact.html" class="links">Contact</a>
            <a href="login.html" class="links">Login</a>
            
        </div>
    </nav>

    <section class="Hero">
        
        <h1>Create Account</h1>
        <p>Join Delicious Bite for faster checkout and order tracking</p>
    </section>

    <section >
        <div class="register-container" >
            <form action="login.html" method="get" >
                <div >
                    <div >
                        <label for="first-name">First Name</label><br>
                        <input type="text" id="first-name" name="first-name" placeholder="Enter your first name" required>
                        <span class="msg"></span>
                    </div>
                    <br>
                    <div >
                        <label for="last-name">Last Name</label><br>
                        <input type="text" id="last-name" name="last-name" placeholder="Enter your last name" required>
                        <span class="msg"></span>
                    </div><br>
                </div>

                <div >
                    <label for="email">Email Address</label><br>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    <span class="msg"></span>
                </div><br>

                <div>
                    <label for="password">Password</label><br>
                    <div class="password-input">
                        <input type="password" id="password" name="password" placeholder="Create a password" required>
                        <button type="button" class="toggle-password">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div><br>

                <div >
                    <label for="confirm-password">Confirm Password</label><br>
                    <div class="password-input">
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
                        <button type="button" class="toggle-password">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                    <span class="msg"></span>
                </div><br>

                <div>
                    <label for="phone">Phone Number</label><br>
                    <input type="tel" id="phone" name="phone" placeholder="+20">
                    <span class="msg"></span>
                </div><br>

                <div class="form-options">
                    <label class="terms-checkbox">
                        <input type="checkbox" id="terms" name="terms" required>
                        <span>I agree to the Terms & Condition and Privacy Policy</span>
                    </label>
                </div>

                <button type="submit" class="btn register-btn">Create Account</button>

                <div class="login-link">
                    <span>Already have an account?</span>
                    <span><a href="login.html">Sign in here</a></span> 
                </div>
            </form>

            
            <div>
                <img  class="contactImg" src="Assets/Data_security_05.jpg" alt="Food Illustration">
            </div>
            
        </div>
    </section>

    <footer>
        <div class="footerContainer">
            <div>
                <div class="footerTitle"> Contact Info</div><br>
                <div><a class="links" href="#">info@gmail.com</a></div>
            </div>
            <div> 
                <div class="footerTitle">Social Media</div><br>
                <div class="social-icons">
                    <a href="https://www.facebook.com"><i class="fab fa-facebook"></i></a> 
                    <a href="https://www.instagram.com"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
        </div>
        <hr style="opacity: 40%;">
        <span>&copy; 2025 Delicious Bite. All rights reserved.</span>
    </footer>
    <script>
        // Registration form validation
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const terms = document.getElementById('terms').checked;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            if (!terms) {
                alert('Please agree to the Terms & Conditions');
                return;
            }
            
            // Simulate successful registration
            alert('Account created successfully! Redirecting to login...');
            window.location.href = 'login.html';
        });
        
        // Password toggle functionality
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.parentElement.querySelector('input');
                const icon = this.querySelector('i');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
        });
    </script>
</body>
</html>
